<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigerian Flag</title> 
    <!--Css styling-->
    <style>
        .flag{
            width: 900px;
            height:600px;
            background-color:rgb(7, 153, 7);
            position: relative;
            border: 1px solid rgb(0, 0, 0);
        }
        .secondary-part{
            position: absolute;
            background-color: white;
            width:225px;
            height: 100%;
            left: 337.5px;

        }
    </style>
</head>
<body>
    <div class="flag">
        <div class="secondary-part"></div>
    </div>
    
</body>
</html>
